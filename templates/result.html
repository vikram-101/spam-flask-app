<!DOCTYPE html>
<html>
<head>
	<title>Prediction Result</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

	<header>
		<div class="container">
		<div id="brandname">
			ML App
		</div>
		<h2>Spam Detector For SMS Messages</h2>
		
	</div>
	</header>
	<p style="color:blue;font-size:20;text-align: center;"><b>Results for Comment</b></p>
	<div class="results">
		
	{% if prediction == 1 %}
	<h2 style="color:red;">🚨 SPAM</h2>
	{% elif prediction == 0 %}
	<h2 style="color:green;">✓ NOT SPAM (Ham)</h2>
	{% endif %}

	</div>
	
	<div style="text-align: center; margin-top: 30px;">
		<a href="{{ url_for('home') }}" style="background-color: #2196F3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Go Back</a>
	</div>

</body>
</html>
